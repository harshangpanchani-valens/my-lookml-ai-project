name: AI LookML Syntax Guard
on:
  pull_request:
    branches: [main]

jobs:
  ai_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ask Gemini AI to Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # This script sends the file to the AI
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: any/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Check this LookML code for syntax errors. If there is an error, describe it. If it is perfect, say PASS. Here is the code: $(cat sales_view.lkml)"
              }]
            }]
          }' > response.json
          
          # Just show the result for now
          cat response.json
