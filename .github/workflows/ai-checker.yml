name: AI LookML Syntax Guard
on:
  pull_request:
    branches: [main]

jobs:
  ai_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ask Gemini AI to Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. Get the list of changed files (comparing current branch to main)
          # We filter for files ending in .lkml
          FILES=$(git diff --name-only origin/main...HEAD | grep '\.lkml$' || true)

          if [ -z "$FILES" ]; then
            echo "No LookML files changed. Skipping AI check."
            exit 0
          fi

          echo "Files to check: $FILES"

          # 2. Loop through each file
          for FILE in $FILES; do
            echo "Checking $FILE..."
            
            # Read file content and escape it for JSON
            CONTENT=$(cat "$FILE")
            
            # 3. Send to AI
            curl -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\":[{
                  \"text\": \"Check this LookML code in the file $FILE for syntax errors. If there is an error, describe it. If it is perfect, say only the word PASS. Here is the code: $CONTENT\"
                }]
              }]
            }" > response.json
            
            cat response.json

            # 4. If any file fails, the whole process fails
            if ! grep -q "PASS" response.json; then
              echo "❌ Error found in $FILE"
              exit 1
            fi
          done

          echo "✅ All LookML files passed!"
